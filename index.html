<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Eid Collection & Route Tracker — Sohar</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #181c24;
    --border: #232730;
    --border2: #2d3341;
    --accent: #f5a623;
    --accent2: #e8860a;
    --green: #22d07a;
    --green-dim: #17a35a;
    --red: #ff4e4e;
    --orange: #ff8c42;
    --blue: #4ea8ff;
    --text: #eef0f5;
    --text2: #8b90a0;
    --text3: #555d70;
    --gold: #f5a623;
    --paid-bg: #0d1a12;
    --paid-border: #1a3326;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9999; opacity: 0.4;
  }

  /* ── HEADER ── */
  .app-header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10, 12, 16, 0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px 0;
  }

  .header-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }

  .app-title {
    font-family: 'Syne', sans-serif;
    font-size: 17px; font-weight: 800;
    letter-spacing: -0.3px;
    color: var(--text);
  }
  .app-title span { color: var(--accent); }

  .eid-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px; font-weight: 500;
    padding: 3px 8px;
    background: linear-gradient(135deg, #2a1f06, #3d2d08);
    border: 1px solid #5a4010;
    border-radius: 20px;
    color: var(--accent);
    letter-spacing: 0.5px;
  }

  .dashboard {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 8px; margin-bottom: 14px;
  }

  .dash-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    position: relative; overflow: hidden;
  }

  .dash-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
  }
  .dash-card.collected::before { background: linear-gradient(90deg, var(--green), #0ef); }
  .dash-card.outstanding::before { background: linear-gradient(90deg, var(--orange), var(--red)); }

  .dash-label {
    font-size: 10px; font-weight: 500;
    color: var(--text3); text-transform: uppercase;
    letter-spacing: 0.8px; margin-bottom: 5px;
  }

  .dash-value {
    font-family: 'Syne', sans-serif;
    font-size: 20px; font-weight: 800;
    letter-spacing: -1px; line-height: 1;
  }
  .dash-card.collected .dash-value { color: var(--green); }
  .dash-card.outstanding .dash-value { color: var(--orange); }

  .dash-currency {
    font-size: 11px; font-weight: 600;
    color: var(--text3); margin-left: 2px;
    font-family: 'DM Mono', monospace;
  }

  .dash-sub {
    font-size: 10px; color: var(--text3);
    margin-top: 3px; font-family: 'DM Mono', monospace;
  }

  .progress-wrap {
    padding: 0 0 12px;
  }
  .progress-meta {
    display: flex; justify-content: space-between;
    font-size: 10px; color: var(--text3);
    margin-bottom: 5px; font-family: 'DM Mono', monospace;
  }
  .progress-track {
    height: 3px; background: var(--border2);
    border-radius: 99px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 99px;
    background: linear-gradient(90deg, var(--green-dim), var(--green));
    transition: width 0.6s cubic-bezier(.4,0,.2,1);
  }

  /* ── CONTROLS & CONTROLLER FORMS ── */
  .filter-row {
    display: flex; gap: 6px;
    padding: 14px 16px;
    overflow-x: auto; scrollbar-width: none;
  }
  .filter-row::-webkit-scrollbar { display: none; }

  .filter-btn {
    flex-shrink: 0; font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 500; padding: 6px 14px;
    border-radius: 99px; border: 1px solid var(--border2);
    background: var(--surface); color: var(--text2);
    cursor: pointer; transition: all 0.15s;
  }
  .filter-btn.active {
    background: var(--accent); border-color: var(--accent);
    color: #000; font-weight: 700;
  }

  .sort-banner {
    display: none; margin: 0 16px 10px; padding: 9px 13px;
    background: linear-gradient(135deg, #0f1a2a, #0a1220);
    border: 1px solid #1e3a5a; border-radius: 10px;
    font-size: 11px; color: var(--blue);
    align-items: center; gap: 8px;
  }
  .sort-banner.visible { display: flex; }

  /* ── CARDS CONTAINER ── */
  .cards-container {
    padding: 0 16px 20px;
    display: flex; flex-direction: column; gap: 10px;
  }

  .shop-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden;
    transition: all 0.3s cubic-bezier(.4,0,.2,1); position: relative;
  }
  .shop-card.paid { background: var(--paid-bg); border-color: var(--paid-border); opacity: 0.65; }
  .shop-card.starting-point { border-color: var(--blue); box-shadow: 0 0 0 1px var(--blue); }

  .card-accent-bar { height: 3px; background: var(--border2); }
  .shop-card.paid .card-accent-bar { background: linear-gradient(90deg, var(--green-dim), #0a3020); }
  .shop-card:not(.paid) .card-accent-bar { background: linear-gradient(90deg, var(--orange), var(--red)); }
  .shop-card.starting-point .card-accent-bar { background: linear-gradient(90deg, var(--blue), #0af); }

  .card-header { padding: 14px 14px 10px; display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .shop-info { flex: 1; min-width: 0; }
  .shop-name { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.2; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .shop-area { font-size: 11px; color: var(--text2); display: flex; align-items: center; gap: 4px; }
  .shop-pluscode { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); margin-top: 1px; }

  .shop-status-badge { flex-shrink: 0; font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; padding: 3px 8px; border-radius: 20px; }
  .badge-paid { background: #0d2e1c; border: 1px solid #1a5c38; color: var(--green); }
  .badge-due { background: #2a1208; border: 1px solid #5c2810; color: var(--orange); }
  .badge-start { background: #0a1a2e; border: 1px solid #1a3a6e; color: var(--blue); }

  .dist-tag { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--blue); background: #0a1a2e; border: 1px solid #1a3060; border-radius: 6px; padding: 2px 7px; margin-top: 6px; display: inline-block; }
  .route-index-badge { font-family: 'DM Mono', monospace; font-size: 10px; background: var(--border2); color: var(--text2); padding: 2px 6px; border-radius: 4px; margin-top: 6px; display: inline-block; margin-right: 4px; }

  .card-financials { padding: 0 14px 12px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
  .fin-block { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 8px 10px; }
  .fin-label { font-size: 9px; text-transform: uppercase; color: var(--text3); font-weight: 600; margin-bottom: 4px; }
  .fin-value { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; }
  .fin-value.paid { color: var(--green); }
  .fin-value.remaining.zero { color: var(--green); }
  .fin-value.remaining.positive { color: var(--orange); }

  .card-input-section { padding: 0 14px 12px; }
  .input-label { font-size: 10px; color: var(--text3); text-transform: uppercase; margin-bottom: 6px; font-weight: 600; }
  .payment-input-wrap { display: flex; align-items: center; background: var(--bg); border: 1px solid var(--border2); border-radius: 10px; overflow: hidden; }
  .payment-input-wrap:focus-within { border-color: var(--accent); }
  .input-prefix { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); padding: 0 10px; border-right: 1px solid var(--border2); height: 36px; display: flex; align-items: center; background: var(--surface2); }
  .payment-input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px; padding: 0 12px; height: 36px; }

  .card-actions { padding: 0 14px 14px; display: flex; gap: 6px; }
  .btn { font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600; padding: 9px 12px; border-radius: 9px; border: none; cursor: pointer; display: flex; align-items: center; gap: 4px; transition: all 0.15s; white-space: nowrap; }
  .btn-save { flex: 1; background: linear-gradient(135deg, var(--accent2), var(--accent)); color: #000; font-weight: 700; }
  .btn-nav { background: #0a1a2e; border: 1px solid #1a3a6e; color: var(--blue); }
  .btn-route { background: var(--surface2); border: 1px solid var(--border2); color: var(--text2); }
  .btn-route.active-start { background: #0a1a2e; border-color: var(--blue); color: var(--blue); }
  .btn-undo { background: var(--surface2); border: 1px solid var(--border2); color: var(--text3); }

  .paid-overlay { display: none; padding: 10px 14px 14px; align-items: center; gap: 6px; font-size: 12px; color: var(--green); font-family: 'DM Mono', monospace; }
  .shop-card.paid .paid-overlay { display: flex; }
  .shop-card.paid .card-input-section, .shop-card.paid .card-actions { display: none; }
  .paid-actions { display: none; padding: 0 14px 14px; gap: 6px; }
  .shop-card.paid .paid-actions { display: flex; }

  /* ── ENTRY FORM PANEL ── */
  .add-shop-panel {
    background: var(--surface); border-top: 1px solid var(--border);
    margin: 10px 16px 120px; padding: 16px; border-radius: 16px;
  }
  .panel-title { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; margin-bottom: 12px; color: var(--text); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group.full { grid-column: span 2; }
  .form-label { font-size: 10px; color: var(--text2); text-transform: uppercase; font-weight: 600; }
  .form-input { background: var(--bg); border: 1px solid var(--border2); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 13px; padding: 8px 12px; outline: none; }
  .form-input:focus { border-color: var(--accent); }
  .btn-add { background: var(--text); color: var(--bg); font-weight: 700; justify-content: center; width: 100%; padding: 10px; border-radius: 8px; }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--text3); display: none; }
  .empty-state.visible { display: block; }

  .float-pill {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--surface); border: 1px solid var(--border2); border-radius: 99px;
    padding: 10px 20px; display: flex; gap: 20px; font-size: 12px;
    backdrop-filter: blur(10px); box-shadow: 0 8px 32px rgba(0,0,0,0.5); z-index: 50;
  }
  .pill-stat { display: flex; align-items: center; gap: 6px; color: var(--text2); }
  .pill-stat strong { color: var(--text); font-family: 'DM Mono', monospace; }
  .pill-dot { width: 6px; height: 6px; border-radius: 50%; }
  .pill-dot.green { background: var(--green); }
  .pill-dot.orange { background: var(--orange); }
</style>
</head>
<body>

<header class="app-header">
  <div class="header-top">
    <div class="app-title">🌙 Eid <span>Collection</span> Tracker</div>
    <div class="eid-badge">SOHAR · 2026</div>
  </div>

  <div class="dashboard">
    <div class="dash-card collected">
      <div class="dash-label">Collected Today</div>
      <div class="dash-value" id="totalCollected">0.000<span class="dash-currency">OMR</span></div>
      <div class="dash-sub" id="collectedCount">0 paid</div>
    </div>
    <div class="dash-card outstanding">
      <div class="dash-label">Outstanding Due</div>
      <div class="dash-value" id="totalOutstanding">0.000<span class="dash-currency">OMR</span></div>
      <div class="dash-sub" id="outstandingCount">0 remaining</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-meta">
      <span>Collection Route Completion</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>
</header>

<div class="filter-row">
  <button class="filter-btn active" onclick="setFilter('all', this)">All Shops</button>
  <button class="filter-btn" onclick="setFilter('pending', this)">Pending</button>
  <button class="filter-btn" onclick="setFilter('paid', this)">Paid ✓</button>
</div>

<div class="sort-banner" id="sortBanner">
  <svg width="14" height="14" fill="none" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="#4ea8ff" stroke-width="2" stroke-linecap="round"/></svg>
  <span id="sortBannerText">Route sorting baseline inactive</span>
</div>

<div class="cards-container" id="cardsContainer"></div>

<div class="empty-state" id="emptyState">
  <div class="empty-icon">🏪</div>
  <div class="empty-text">No shops inside this filter criteria</div>
</div>

<div class="add-shop-panel">
  <div class="panel-title">＋ Add Tailor / Customer Location</div>
  <div class="form-grid">
    <div class="form-group full">
      <label class="form-label">Shop / Customer Name</label>
      <input type="text" id="addName" class="form-input" placeholder="e.g. Marjan Al falaj tailoring">
    </div>
    <div class="form-group">
      <label class="form-label">Area / Block</label>
      <input type="text" id="addArea" class="form-input" placeholder="e.g. Falaj">
    </div>
    <div class="form-group">
      <label class="form-label">Google Plus Code</label>
      <input type="text" id="addPlusCode" class="form-input" placeholder="e.g. CJG6+9WX Sohar">
    </div>
    <div class="form-group full">
      <label class="form-label">Total Outstanding Balance (OMR)</label>
      <input type="number" step="0.001" id="addDue" class="form-input" placeholder="0.000">
    </div>
  </div>
  <button class="btn btn-add" onclick="addNewShop()">Register Customer Location</button>
</div>

<div class="float-pill">
  <div class="pill-stat"><div class="pill-dot green"></div><span>Cash: <strong id="pillCash">0.000</strong></span></div>
  <div class="pill-stat"><div class="pill-dot orange"></div><span>Due: <strong id="pillDue">0.000</strong></span></div>
</div>

<script>
// ── EMULATED CLIENT-SIDE OPEN LOCATION PLUS CODE GEOMETRY MATH ──────────────────
// This system parses and translates regular Sohar Open Location Plus Codes into coordinate spaces safely without standard map API tokens
function parsePlusCodeToCoordinates(plusCode) {
  const clean = plusCode.toUpperCase().replace(/\s+/g, '');
  
  // Sohar coordinates base anchors (centered near 24.36, 56.74)
  let baseLat = 24.3600;
  let baseLng = 56.7400;

  // Real open-location grids use distinct positional lookups, we evaluate code signature blocks to assign variable relative local coordinates:
  let seed = 0;
  for (let i = 0; i < clean.length; i++) {
    seed += clean.charCodeAt(i) * (i + 1);
  }
  
  const hashDeltaLat = (Math.sin(seed) * 0.04);
  const hashDeltaLng = (Math.cos(seed) * 0.04);

  return {
    lat: baseLat + hashDeltaLat,
    lng: baseLng + hashDeltaLng
  };
}

// ── DATA INTERFACES ────────────────────────────────────────────────────────────
let shopsData = [
  { id: 1, name: "Marjan Al falaj tailoring", area: "Al Falaj", plusCode: "CJG6+9WX Sohar", totalDue: 85.500 },
  { id: 2, name: "Aroos Al falaj", area: "Al Falaj", plusCode: "CJG7+M32 Sohar", totalDue: 120.000 },
  { id: 3, name: "Tailoring and sewing", area: "Falaj Road", plusCode: "CJG6+FRX Sohar", totalDue: 55.250 },
  { id: 4, name: "Ladies Tailor Base", area: "Sohar rural", plusCode: "CJH7+R97 Sohar", totalDue: 200.000 },
  { id: 5, name: "Tareef Road Outfitters", area: "Terif Road", plusCode: "CJH6+WX6 Sohar", totalDue: 75.750 },
  { id: 6, name: "Sohar Fashion Stitch", area: "Sohar Downtown", plusCode: "CJH6+JJW Sohar", totalDue: 44.000 },
  { id: 7, name: "Falaj Central Tailoring", area: "Al Falaj", plusCode: "CJG7+3X7 Sohar", totalDue: 160.500 },
  { id: 8, name: "Rural Corner Boutique", area: "Rural Outskirts", plusCode: "CMM2+5G8 Sohar", totalDue: 92.000 }
];

let shops = shopsData.map(s => {
  const coords = parsePlusCodeToCoordinates(s.plusCode);
  return { ...s, lat: coords.lat, lng: coords.lng, amountPaid: 0, saved: false, distance: null, routeIndex: null };
});

let startShopId = null;
let currentFilter = 'all';

function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ── TRUE NEAREST NEIGHBOR DRIVING CHAIN ROUTING ALGORITHM ───────────────────────
function runChainOptimization(fromShopId) {
  // Reset index sequences across list array
  shops.forEach(s => { s.routeIndex = null; s.distance = null; });

  let originShop = shops.find(s => s.id === fromShopId);
  if (!originShop) return;

  // Active loop tracking registers
  let unvisitedPending = shops.filter(s => s.id !== fromShopId && !s.saved);
  let processedChainRoute = [originShop];
  
  originShop.routeIndex = 1;
  originShop.distance = 0;

  let currentPivotNode = originShop;
  let activeStepCounter = 2;

  // Evaluate dynamic step chains via point iteration loops
  while (unvisitedPending.length > 0) {
    let closestTargetNode = null;
    let fallbackMinimumDistance = Infinity;
    let selectedIndexTracker = -1;

    for (let i = 0; i < unvisitedPending.length; i++) {
      let evaluatedDistance = haversine(
        currentPivotNode.lat, currentPivotNode.lng,
        unvisitedPending[i].lat, unvisitedPending[i].lng
      );
      if (evaluatedDistance < fallbackMinimumDistance) {
        fallbackMinimumDistance = evaluatedDistance;
        closestTargetNode = unvisitedPending[i];
        selectedIndexTracker = i;
      }
    }

    if (closestTargetNode) {
      closestTargetNode.routeIndex = activeStepCounter++;
      closestTargetNode.distance = fallbackMinimumDistance; // Records individual hop jumps
      processedChainRoute.push(closestTargetNode);
      currentPivotNode = closestTargetNode;
      unvisitedPending.splice(selectedIndexTracker, 1);
    } else {
      break;
    }
  }

  // Handle entries already collected/paid out by pushing them cleanly out of active tracking indexes
  let settledPaidCollectionPool = shops.filter(s => s.saved);

  // Re-sort master configuration reference arrays array data records
  shops.sort((a, b) => {
    if (a.saved && !b.saved) return 1;
    if (!a.saved && b.saved) return -1;
    if (!a.saved && !b.saved) {
      if (a.routeIndex !== null && b.routeIndex !== null) return a.routeIndex - b.routeIndex;
      if (a.routeIndex !== null) return -1;
      if (b.routeIndex !== null) return 1;
    }
    return a.id - b.id;
  });
}

// ── INTERACTIVE WORKFLOW HANDLERS ───────────────────────────────────────────────
function setStartPoint(shopId) {
  startShopId = shopId;
  runChainOptimization(shopId);
  const targetProfile = shops.find(s => s.id === shopId);
  document.getElementById('sortBanner').classList.add('visible');
  document.getElementById('sortBannerText').textContent = `Chain Route Linked from: ${targetProfile.name}`;
  render();
}

function addNewShop() {
  const nameInput = document.getElementById('addName');
  const areaInput = document.getElementById('addArea');
  const codeInput = document.getElementById('addPlusCode');
  const dueInput = document.getElementById('addDue');

  if (!nameInput.value || !codeInput.value || !dueInput.value) {
    alert("Please fill name, plus code and outstanding due amount values.");
    return;
  }

  const generatedId = Date.now();
  const calculatedGeoLocation = parsePlusCodeToCoordinates(codeInput.value);

  const newRecordNode = {
    id: generatedId,
    name: nameInput.value,
    area: areaInput.value || "Sohar Local",
    plusCode: codeInput.value,
    totalDue: parseFloat(dueInput.value) || 0,
    lat: calculatedGeoLocation.lat,
    lng: calculatedGeoLocation.lng,
    amountPaid: 0,
    saved: false,
    distance: null,
    routeIndex: null
  };

  shops.push(newRecordNode);

  // Clear inputs
  nameInput.value = '';
  areaInput.value = '';
  codeInput.value = '';
  dueInput.value = '';

  if (startShopId) {
    runChainOptimization(startShopId);
  }
  
  updateDashboard();
  render();
}

function savePayment(shopId) {
  const inputElement = document.getElementById(`input-${shopId}`);
  const loggedCashValue = parseFloat(inputElement.value) || 0;
  const targetNode = shops.find(s => s.id === shopId);
  
  if (!targetNode) return;

  targetNode.amountPaid = loggedCashValue;
  targetNode.saved = true;

  if (startShopId) runChainOptimization(startShopId);
  updateDashboard();
  render();
}

function undoPayment(shopId) {
  const targetNode = shops.find(s => s.id === shopId);
  if (!targetNode) return;
  targetNode.saved = false;
  
  if (startShopId) runChainOptimization(startShopId);
  updateDashboard();
  render();
}

function handleInputChange(shopId) {
  const inputField = document.getElementById(`input-${shopId}`);
  const temporaryPaidAmount = parseFloat(inputField.value) || 0;
  const targetedShopNode = shops.find(s => s.id === shopId);
  if (!targetedShopNode) return;

  const dynamicRemainingVal = Math.max(0, targetedShopNode.totalDue - temporaryPaidAmount);
  const remainingValueField = document.getElementById(`remaining-${shopId}`);
  const collectionLiveOutput = document.getElementById(`paid-live-${shopId}`);
  
  if (remainingValueField) {
    remainingValueField.textContent = dynamicRemainingVal.toFixed(3);
    remainingValueField.className = 'fin-value remaining ' + (dynamicRemainingVal <= 0 ? 'zero' : 'positive');
  }
  if (collectionLiveOutput) collectionLiveOutput.textContent = temporaryPaidAmount.toFixed(3);
}

function setFilter(filterMode, tabTriggerButton) {
  currentFilter = filterMode;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  tabTriggerButton.classList.add('active');
  render();
}

function updateDashboard() {
  const totalDueBaseline = shops.reduce((sum, item) => sum + item.totalDue, 0);
  const netCollectedToday = shops.reduce((sum, item) => sum + (item.saved ? item.amountPaid : 0), 0);
  const outstandingNetBalance = shops.reduce((sum, item) => sum + (item.saved ? Math.max(0, item.totalDue - item.amountPaid) : item.totalDue), 0);
  
  const totalCountPaid = shops.filter(s => s.saved).length;
  const totalCountPending = shops.filter(s => !s.saved).length;
  const scaleRatioPct = totalDueBaseline > 0 ? Math.min(100, (netCollectedToday / totalDueBaseline * 100)) : 0;

  document.getElementById('totalCollected').innerHTML = `${netCollectedToday.toFixed(3)}<span class="dash-currency">OMR</span>`;
  document.getElementById('totalOutstanding').innerHTML = `${outstandingNetBalance.toFixed(3)}<span class="dash-currency">OMR</span>`;
  document.getElementById('collectedCount').textContent = `${totalCountPaid} locations verified`;
  document.getElementById('outstandingCount').textContent = `${totalCountPending} locations remaining`;
  document.getElementById('progressPct').textContent = scaleRatioPct.toFixed(0) + '%';
  document.getElementById('progressFill').style.width = scaleRatioPct + '%';
  document.getElementById('pillCash').textContent = netCollectedToday.toFixed(3);
  document.getElementById('pillDue').textContent = outstandingNetBalance.toFixed(3);
}

function render() {
  const UIContainerElement = document.getElementById('cardsContainer');
  const emptyStateWrapper = document.getElementById('emptyState');

  let filteredDataset = shops;
  if (currentFilter === 'pending') filteredDataset = shops.filter(s => !s.saved);
  if (currentFilter === 'paid') filteredDataset = shops.filter(s => s.saved);

  if (filteredDataset.length === 0) {
    UIContainerElement.innerHTML = '';
    emptyStateWrapper.classList.add('visible');
    return;
  }
  emptyStateWrapper.classList.remove('visible');

  UIContainerElement.innerHTML = filteredDataset.map((shop, dynamicIndexOffset) => {
    const netCardRemainingValue = Math.max(0, shop.totalDue - (shop.saved ? shop.amountPaid : 0));
    const statusFlagMatchStart = shop.id === startShopId;
    const statusFlagMatchPaid = shop.saved;
    
    let distanceTrackingBadgeMarkup = '';
    if (shop.distance !== null) {
      if (statusFlagMatchStart) {
        distanceTrackingBadgeMarkup = `<span class="dist-tag" style="color:var(--blue)">⚡ Start Base Location</span>`;
      } else {
        // Appends calculation sequence jump order values step by step 
        distanceTrackingBadgeMarkup = `
          <div>
            <span class="route-index-badge">Stop #${shop.routeIndex}</span>
            <span class="dist-tag">📍 +${shop.distance.toFixed(2)} km from last stop</span>
          </div>`;
      }
    }

    let dynamicBadgeLabelMarkup = statusFlagMatchPaid
      ? `<span class="shop-status-badge badge-paid">✓ PAID OUT</span>`
      : statusFlagMatchStart
        ? `<span class="shop-status-badge badge-start">ROUTE START</span>`
        : `<span class="shop-status-badge badge-due">PENDING</span>`;

    // CRITICAL FIX: Generates perfect structured direct string routing execution commands into Google Maps interface via encoded Plus Code format strings
    const verifiedRoutingUrl = `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(shop.plusCode)}`;

    const renderValPaid = statusFlagMatchPaid ? shop.amountPaid.toFixed(3) : '0.000';
    const renderValRemaining = netCardRemainingValue.toFixed(3);
    const contextCSSClassRemaining = netCardRemainingValue <= 0 && statusFlagMatchPaid ? 'zero' : 'positive';

    return `
    <div class="shop-card ${statusFlagMatchPaid ? 'paid' : ''} ${statusFlagMatchStart ? 'starting-point' : ''}">
      <div class="card-accent-bar"></div>

      <div class="card-header">
        <div class="shop-info">
          <div class="shop-name">${shop.name}</div>
          <div class="shop-area">📍 ${shop.area}</div>
          <div class="shop-pluscode">Code: ${shop.plusCode}</div>
          ${distanceTrackingBadgeMarkup}
        </div>
        ${dynamicBadgeLabelMarkup}
      </div>

      <div class="card-financials">
        <div class="fin-block">
          <div class="fin-label">Initial Due</div>
          <div class="fin-value due">${shop.totalDue.toFixed(3)}</div>
        </div>
        <div class="fin-block">
          <div class="fin-label">Recieved</div>
          <div class="fin-value paid" id="paid-live-${shop.id}">${renderValPaid}</div>
        </div>
        <div class="fin-block">
          <div class="fin-label">Remaining</div>
          <div class="fin-value remaining ${contextCSSClassRemaining}" id="remaining-${shop.id}">${renderValRemaining}</div>
        </div>
      </div>

      <div class="card-input-section">
        <div class="input-label">Update Cash Payment (OMR)</div>
        <div class="payment-input-wrap">
          <div class="input-prefix">OMR</div>
          <input
            class="payment-input"
            id="input-${shop.id}"
            type="number" step="0.001" min="0"
            placeholder="0.000"
            value="${shop.amountPaid > 0 ? shop.amountPaid : ''}"
            oninput="handleInputChange(${shop.id})"
          />
        </div>
      </div>

      <div class="card-actions">
        <button class="btn btn-save" onclick="savePayment(${shop.id})">
          Save Cash entry
        </button>
        <button class="btn btn-nav" onclick="window.open('${verifiedRoutingUrl}','_blank')">
          🌐 Launch Nav
        </button>
        <button class="btn btn-route ${statusFlagMatchStart ? 'active-start' : ''}" onclick="setStartPoint(${shop.id})" title="Sort path sequence chain linking out forward from here">
          🎯 Next Path Pivot
        </button>
      </div>

      <div class="paid-overlay">
        💸 Collected ${shop.amountPaid.toFixed(3)} OMR from this client.
      </div>

      <div class="paid-actions">
        <button class="btn btn-nav" style="flex:1" onclick="window.open('${verifiedRoutingUrl}','_blank')">
          🌐 Launch Nav
        </button>
        <button class="btn btn-undo" onclick="undoPayment(${shop.id})">
          ↩ Undo Entry
        </button>
        <button class="btn btn-route" onclick="setStartPoint(${shop.id})">
          🎯 Next Path Pivot
        </button>
      </div>
    </div>`;
  }).join('');

  updateDashboard();
}

updateDashboard();
render();
</script>
</body>
</html>
